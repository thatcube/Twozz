name: Twizz
options:
  bundleIdPrefix: com.thatcube.Twizz
  deploymentTarget:
    tvOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Twizz/App/Info.plist
    TARGETED_DEVICE_FAMILY: "3" # Apple TV
configFiles:
  Debug: Config/App.xcconfig
  Release: Config/App.xcconfig
packages:
  SDWebImage:
    url: https://github.com/SDWebImage/SDWebImage.git
    from: 5.21.0
  SDWebImageSwiftUI:
    url: https://github.com/SDWebImage/SDWebImageSwiftUI.git
    from: 3.1.3
  SDWebImageWebPCoder:
    url: https://github.com/SDWebImage/SDWebImageWebPCoder.git
    from: 0.14.6
targets:
  Twizz:
    type: application
    platform: tvOS
    sources:
      - path: Twizz
    dependencies:
      - package: SDWebImage
        product: SDWebImage
      - package: SDWebImageSwiftUI
        product: SDWebImageSwiftUI
      - package: SDWebImageWebPCoder
        product: SDWebImageWebPCoder
      - target: TopShelfExtension
        embed: true
    postBuildScripts:
      - name: Set build number from git commit count
        basedOnDependencyAnalysis: false
        script: |
          # Derive an auto-incrementing build number from the git history so
          # CFBundleVersion revises on every commit without manual edits. Runs
          # before code signing so the patched Info.plist stays validly signed.
          set -e
          buildNumber=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo 1)
          plist="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          if [ -f "$plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $buildNumber" "$plist"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Twizz
        DEVELOPMENT_TEAM: N8Z5T4AK3X
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Twizz/App/Twizz.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  TopShelfExtension:
    type: com.apple.product-type.tv-app-extension
    platform: tvOS
    sources:
      - path: TopShelfExtension/ContentProvider.swift
      - path: Twizz/Shared/TopShelfSnapshot.swift
      - path: Twizz/Shared/TopShelfStore.swift
    postBuildScripts:
      - name: Set build number from git commit count
        basedOnDependencyAnalysis: false
        script: |
          # Keep the extension's CFBundleVersion in lockstep with the app's.
          # tvOS refuses to load an app extension whose CFBundleVersion does
          # not match its containing app, which leaves the Top Shelf empty.
          set -e
          buildNumber=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo 1)
          plist="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          if [ -f "$plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $buildNumber" "$plist"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Twizz.TopShelfExtension
        DEVELOPMENT_TEAM: N8Z5T4AK3X
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: TopShelfExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: TopShelfExtension/TopShelfExtension.entitlements
