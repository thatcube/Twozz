name: Twitcher
options:
  bundleIdPrefix: com.thatcube.twitcher
  deploymentTarget:
    tvOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_TWITCH_CLIENT_ID: "$(TWITCH_CLIENT_ID)"
    TARGETED_DEVICE_FAMILY: "3" # Apple TV
configFiles:
  Debug: Config/App.xcconfig
  Release: Config/App.xcconfig
packages:
  SDWebImage:
    url: https://github.com/SDWebImage/SDWebImage.git
    from: 5.21.0
  SDWebImageSwiftUI:
    url: https://github.com/SDWebImage/SDWebImageSwiftUI.git
    from: 3.1.3
  SDWebImageWebPCoder:
    url: https://github.com/SDWebImage/SDWebImageWebPCoder.git
    from: 0.14.6
targets:
  Twitcher:
    type: application
    platform: tvOS
    sources:
      - path: Twitcher
    dependencies:
      - package: SDWebImage
        product: SDWebImage
      - package: SDWebImageSwiftUI
        product: SDWebImageSwiftUI
      - package: SDWebImageWebPCoder
        product: SDWebImageWebPCoder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.twitcher
        DEVELOPMENT_TEAM: N8Z5T4AK3X
        CODE_SIGN_STYLE: Automatic
        # App icons added later; omitted so initial builds don't fail on missing assets.
