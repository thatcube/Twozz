name: Twitcher
options:
  bundleIdPrefix: com.thatcube.twitcher
  deploymentTarget:
    tvOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    TARGETED_DEVICE_FAMILY: "3" # Apple TV
targets:
  Twitcher:
    type: application
    platform: tvOS
    sources:
      - path: Twitcher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.twitcher
        DEVELOPMENT_TEAM: N8Z5T4AK3X
        CODE_SIGN_STYLE: Automatic
        # App icons added later; omitted so initial builds don't fail on missing assets.
